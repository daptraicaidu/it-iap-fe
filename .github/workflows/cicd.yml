name: CI

on:
push:
branches:
- main
- develop
- feature/**
pull_request:
branches:
- main
- develop

jobs:
build:
runs-on: ubuntu-latest

```
strategy:
  matrix:
    node-version: [22]

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: ${{ matrix.node-version }}
      cache: npm

  - name: Install dependencies
    run: npm ci

  - name: Lint
    run: npm run lint

  - name: Build
    run: npm run build
```
